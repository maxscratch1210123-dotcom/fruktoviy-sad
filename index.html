<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fruit Garden Match</title>
<style>
*{box-sizing:border-box;user-select:none;margin:0;padding:0}
body{min-height:100vh;background:#1a1a24;display:flex;justify-content:center;align-items:center;font-family:sans-serif;overflow:hidden;touch-action:manipulation}
.container{background:#1e1e2e;padding:10px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.7);width:100%;max-width:520px;max-height:98vh;overflow:hidden;display:flex;flex-direction:column;gap:8px}
.top-bar{background:#c0392b;border-radius:15px;padding:10px 15px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.avatar{width:36px;height:36px;background:#f1c40f;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.currencies{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.currency-item{display:flex;align-items:center;gap:4px;color:#eee;font-size:14px;font-weight:700;background:rgba(0,0,0,0.3);padding:4px 10px;border-radius:20px}
.currency-item span{color:#f1c40f}
.energy-bar-wrap{flex:1;min-width:80px;height:20px;background:rgba(0,0,0,0.5);border-radius:10px;overflow:hidden;position:relative}
.energy-bar-fill{height:100%;background:linear-gradient(90deg,#f39c12,#f1c40f);border-radius:10px;transition:width 0.3s}
.energy-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;color:#fff;font-weight:700}
.main-content{flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.menu-screen{display:flex;flex-direction:column;align-items:center;gap:12px;padding:15px 10px}
.menu-screen h1{color:#f1c40f;font-size:24px;text-align:center}
.play-btn{background:#f1c40f;border:none;color:#1a1a2e;padding:15px 50px;border-radius:40px;font-size:22px;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(241,196,15,0.4)}
.daily-offer{background:#c0392b;border-radius:15px;padding:12px;text-align:center;color:#eee;margin-top:5px}
.daily-offer button{background:#f1c40f;border:none;color:#1a1a2e;padding:8px 20px;border-radius:20px;font-weight:700;cursor:pointer;font-size:14px}
.daily-offer button:disabled{background:#555;color:#888}
.energy-section{text-align:center;padding:5px 0}
.energy-section .progress-wrap{width:80%;height:18px;background:rgba(255,255,255,0.1);border-radius:9px;overflow:hidden;margin:8px auto}
.energy-section .progress-fill{height:100%;background:linear-gradient(90deg,#3498db,#2ecc71);border-radius:9px}
.game-screen{display:none;flex-direction:column;gap:6px;flex:1}
.game-header{display:flex;justify-content:space-between;align-items:center;color:#eee;font-size:13px;font-weight:700;background:#c0392b;border-radius:12px;padding:8px 12px}
.game-header .moves{background:rgba(0,0,0,0.3);padding:4px 10px;border-radius:15px;color:#f1c40f}
.game-header button{background:rgba(0,0,0,0.4);border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:11px;cursor:pointer}
.abilities-bar{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.abilities-bar button{font-size:10px;padding:4px 8px;background:#8b5cf6;border:none;color:#fff;border-radius:12px;cursor:pointer}
.abilities-bar .shop-in-game{background:#f1c40f;color:#1a1a2e;font-weight:700}
.board{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;background:#0f3460;padding:5px;border-radius:10px;max-width:100%;aspect-ratio:1/1}
.cell{aspect-ratio:1/1;background:#1a1a2e;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;box-shadow:inset 0 -2px 0 rgba(0,0,0,0.4)}
.cell.selected{outline:2px solid #f1c40f;outline-offset:-2px;transform:scale(0.92)}
.cell.bomb{background:radial-gradient(circle,#f39c12,#e74c3c);color:#fff}
.cell.vase{background:#8b5cf6;color:#fff}
.cell.fruit{background:#2ecc71;color:#fff}
.empty{background:#0a0a1a;cursor:default}
.cell.falling{animation:dropIn 0.25s ease-out}
.cell.matched{animation:matchPop 0.25s ease-out forwards}
@keyframes dropIn{0%{transform:translateY(-60px) scale(0.7);opacity:0}100%{transform:translateY(0) scale(1);opacity:1}}
@keyframes matchPop{0%{transform:scale(1)}100%{transform:scale(0)}}
.bottom-nav{background:#c0392b;border-radius:15px;padding:8px 5px;display:flex;justify-content:space-around}
.nav-btn{background:transparent;border:none;color:#fff;font-size:11px;cursor:pointer;padding:6px 4px;border-radius:10px;display:flex;flex-direction:column;align-items:center;flex:1}
.nav-btn.active{background:rgba(255,255,255,0.2);font-weight:700}
.metro-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.metro-content{background:#16213e;padding:20px;border-radius:20px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto;color:#eee}
.metro-content h2{color:#f1c40f;text-align:center;margin-bottom:15px}
.metro-content .station{background:#0f3460;padding:12px;border-radius:12px;margin-bottom:10px}
.metro-content .station button{background:#f1c40f;border:none;padding:6px 16px;border-radius:20px;font-weight:700;cursor:pointer;color:#1a1a2e;font-size:14px;margin-top:4px}
.metro-content .station button:disabled{background:#555;color:#888}
.metro-content .close-btn{background:#e74c3c;border:none;color:#fff;padding:10px 20px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;width:100%;margin-top:15px}
</style>
</head>
<body>
<div class="container">
<div class="top-bar">
<div class="avatar">👤</div>
<div class="currencies">
<div class="currency-item">🪙 <span id="goldDisplay">0</span></div>
<div class="currency-item">🫙 <span id="bottleDisplay">0</span></div>
</div>
<div class="energy-bar-wrap">
<div class="energy-bar-fill" id="energyFill" style="width:0%"></div>
<div class="energy-text" id="energyText">0/1000</div>
</div>
</div>
<div class="main-content" id="mainContent">

<h1>🍎 Fruit Garden Match</h1>
<div class="energy-section">
<div>⚡ <span id="menuEnergyText">0/1000</span></div>
<div class="progress-wrap"><div class="progress-fill" id="menuEnergyFill" style="width:0%"></div></div>
</div>
<button class="play-btn" id="playBtn">🎮 ИГРАТЬ</button>
<div class="daily-offer" id="dailyOffer">
<p id="dailyOfferText">Загрузка...</p>
<button id="dailyOfferBtn">Забрать</button>
</div>
</div>
<div class="game-screen" id="gameScreen">
<div class="game-header">
<div>Ур.<span id="levelDisplay">1</span> 🎯<span id="targetDisplay">0</span>/<span id="totalTargetDisplay">5</span></div>

<button id="useMoves5">➕5 (<span id="countMoves5">0</span>)</button>

<div class="board" id="board"></div>
</div>
</div>
<div class="bottom-nav">
<button class="nav-btn" id="navShop">🛒</button>
<button class="nav-btn" id="navTournament">🏆</button>

<button class="nav-btn" id="navQuests">📋</button>

</div>
</div>
<script>
(function(){
var R=8,C=8,S=['🍎','🍊','🍇','🍉','🍓','🍋','🥝'],V='🏺',B='💥',MAX_MOVES=35;
var GOLD_PER_LEVEL=10,BOTTLES_PER_LEVEL=50,ENERGY_PER_MOVE=100,DAILY_COST=15;
var ENERGY_TIERS=[1000,2000,3000,4000,5000],ENERGY_REWARDS=[100,150,200,300,500];
var b=[],gold=parseInt(localStorage.getItem('gold'))||0,cur=parseInt(localStorage.getItem('bottleCurrency'))||0;
var energy=parseInt(localStorage.getItem('energy'))||0,energyTier=parseInt(localStorage.getItem('energyTier'))||0;
var lv=parseInt(localStorage.getItem('currentLevel'))||1,isFruitLevel=true,target=45,p=0,m=MAX_MOVES,sr=-1,sc=-1,proc=false;
var ST=[{id:'vdnh',name:'ВДНХ',cost:50,bonus:{moves:1}},{id:'sokol',name:'Сокол',cost:150,bonus:{moves:1}},{id:'park',name:'Парк Культуры',cost:300,bonus:{moves:2}},{id:'kiev',name:'Киевская',cost:500,bonus:{bottles:0.05}},{id:'arbat',name:'Арбатская',cost:800,bonus:{bottles:0.1}},{id:'ring',name:'Кольцевая',cost:1200,bonus:{moves:3}}];
var owned=JSON.parse(localStorage.getItem('metroStations'))||[],abilities=JSON.parse(localStorage.getItem('abilities'))||{moves5:0,moves10:0,bombs:0,shuffles:0};
var dailyData=JSON.parse(localStorage.getItem('dailyOffer'))||{date:'',type:'',claimed:false};
var be=document.getElementById('board'),ld=document.getElementById('levelDisplay'),td=document.getElementById('targetDisplay'),ttd=document.getElementById('totalTargetDisplay'),md=document.getElementById('movesDisplay');
var goldD=document.getElementById('goldDisplay'),bottleD=document.getElementById('bottleDisplay'),energyFill=document.getElementById('energyFill'),energyText=document.getElementById('energyText');
var menuEnergyFill=document.getElementById('menuEnergyFill'),menuEnergyText=document.getElementById('menuEnergyText'),ms=document.getElementById('menuScreen'),gs=document.getElementById('gameScreen');

function saveAbilities(){localStorage.setItem('abilities',JSON.stringify(abilities));}
function getBonusMoves(){var t=0;for(var i=0;i<owned.length;i++){var s=ST.find(function(st){return st.id===owned[i];});if(s&&s.bonus.moves)t+=s.bonus.moves;}return t;}
function getBonusBottles(){var t=1;for(var i=0;i<owned.length;i++){var s=ST.find(function(st){return st.id===owned[i];});if(s&&s.bonus.bottles)t+=s.bonus.bottles;}return t;}
function getStationCost(id){var s=ST.find(function(st){return st.id===id;});var cnt=owned.filter(function(st){return st===id;}).length;return Math.round(s.cost*(1+cnt*0.2));}
function getTarget(){var base=isFruitLevel?45:4,growth=isFruitLevel?5:1,max=isFruitLevel?120:15;return Math.min(base+lv*growth,max);}
function updateEnergyUI(){var tier=energyTier<ENERGY_TIERS.length?ENERGY_TIERS[energyTier]:ENERGY_TIERS[ENERGY_TIERS.length-1];var pct=Math.min(100,(energy/tier)*100);if(energyFill)energyFill.style.width=pct+'%';if(energyText)energyText.textContent=energy+'/'+tier;if(menuEnergyFill)menuEnergyFill.style.width=pct+'%';if(menuEnergyText)menuEnergyText.textContent=energy+'/'+tier;}
function addEnergy(amount){energy+=amount;var tier=energyTier<ENERGY_TIERS.length?ENERGY_TIERS[energyTier]:ENERGY_TIERS[ENERGY_TIERS.length-1];while(energy>=tier){energy-=tier;var reward=energyTier<ENERGY_REWARDS.length?ENERGY_REWARDS[energyTier]:500;cur+=reward;if(energyTier<ENERGY_TIERS.length-1)energyTier++;tier=energyTier<ENERGY_TIERS.length?ENERGY_TIERS[energyTier]:ENERGY_TIERS[ENERGY_TIERS.length-1];alert('⚡ Энергия заполнена! +'+reward+' 🫙');}localStorage.setItem('energy',energy);localStorage.setItem('energyTier',energyTier);updateEnergyUI();}
function generateDailyOffer(){var today=new Date().toDateString();if(dailyData.date!==today){dailyData={date:today,type:Math.random()<0.5?'bottles':'moves',claimed:false};localStorage.setItem('dailyOffer',JSON.stringify(dailyData));}var ot=document.getElementById('dailyOfferText'),ob=document.getElementById('dailyOfferBtn');if(ot&&ob){if(dailyData.claimed){ot.textContent='✅ Уже забрано!';ob.disabled=true;ob.textContent='Забрано';}else{ot.textContent=dailyData.type==='bottles'?'100 🫙 за '+DAILY_COST+' 🪙':'+10 ходов за '+DAILY_COST+' 🪙';ob.disabled=gold<DAILY_COST;ob.textContent=gold<DAILY_COST?'Нужно '+DAILY_COST+' 🪙':'Забрать';}}}
function claimDailyOffer(){if(dailyData.claimed)return;if(gold<DAILY_COST){alert('❌ Не хватает монет!');return;}gold-=DAILY_COST;dailyData.claimed=true;if(dailyData.type==='bottles'){cur+=100;alert('✅ +100 🫙!');}else{abilities.moves10=(abilities.moves10||0)+1;saveAbilities();alert('✅ +10 ходов!');}localStorage.setItem('dailyOffer',JSON.stringify(dailyData));localStorage.setItem('gold',gold);u();generateDailyOffer();}
function u(){localStorage.setItem('bottleCurrency',cur);localStorage.setItem('gold',gold);localStorage.setItem('currentLevel',lv);if(goldD)goldD.textContent=gold;if(bottleD)bottleD.textContent=cur;if(ld)ld.textContent=lv;if(td)td.textContent=p;if(ttd)ttd.textContent=target;if(md)md.textContent=m;updateEnergyUI();var cm5=document.getElementById('countMoves5'),cm10=document.getElementById('countMoves10'),cb=document.getElementById('countBombs'),cs=document.getElementById('countShuffles');if(cm5)cm5.textContent=abilities.moves5||0;if(cm10)cm10.textContent=abilities.moves10||0;if(cb)cb.textContent=abilities.bombs||0;if(cs)cs.textContent=abilities.shuffles||0;}
function createBoard(){isFruitLevel=lv%2===1;target=getTarget();var nb=[];for(var r=0;r<R;r++){var row=[];for(var c=0;c<C;c++){if(!isFruitLevel&&Math.random()<0.15&&r>0&&r<R-1&&c>0&&c<C-1){row.push(V);}else{var sym,a=0;do{sym=S[Math.floor(Math.random()*S.length)];a++;if(a>50)break;}while((r>=2&&nb[r-1][c]===sym&&nb[r-2][c]===sym)||(c>=2&&row[c-1]===sym&&row[c-2]===sym));row.push(sym);}}nb.push(row);}return nb;}
function findMatches(d){var m=new Set(),g=[];for(var r=0;r<R;r++){var c=0;while(c<C){var sym=d[r][c];if(sym===null||sym===B||sym===V){c++;continue;}var len=1;while(c+len<C&&d[r][c+len]===sym)len++;if(len>=3){var cells=[];for(var i=0;i<len;i++)cells.push(r+','+(c+i));g.push({symbol:sym,cells:cells,length:len});for(var i2=0;i2<cells.length;i2++)m.add(cells[i2]);}c+=len;}}for(var c2=0;c2<C;c2++){var r2=0;while(r2<R){var sym2=d[r2][c2];if(sym2===null||sym2===B||sym2===V){r2++;continue;}var len2=1;while(r2+len2<R&&d[r2+len2][c2]===sym2)len2++;if(len2>=3){var cells2=[];for(var j=0;j<len2;j++)cells2.push((r2+j)+','+c2);g.push({symbol:sym2,cells:cells2,length:len2});for(var j2=0;j2<cells2.length;j2++)m.add(cells2[j2]);}r2+=len2;}}return{matches:m,groups:g};}
function ab(row,col){var d=new Set();for(var c=0;c<C;c++){if(b[row][c]!==null&&b[row][c]!==B)d.add(row+','+c);}d.add(row+','+col);return d;}
function rb(fall,mset,eset,bcset){if(!be)return;be.innerHTML='';for(var r=0;r<R;r++){for(var c=0;c<C;c++){var cell=document.createElement('div');cell.className='cell';var v=b[r][c];cell.textContent=v||'';if(v===null)cell.classList.add('empty');if(v===B)cell.classList.add('bomb');if(v===V)cell.classList.add('vase');if(isFruitLevel&&v!==null&&v!==B&&v!==V)cell.classList.add('fruit');if(sr===r&&sc===c)cell.classList.add('selected');if(mset&&mset.has(r+','+c))cell.classList.add('matched');if(eset&&eset.has(r+','+c))cell.classList.add('exploding');if(bcset&&bcset.has(r+','+c))cell.classList.add('bomb-created');if(fall&&v!==null&&v!==B)cell.classList.add('falling');cell.dataset.row=r;cell.dataset.col=c;cell.addEventListener('click',onClick);be.appendChild(cell);}}u();}
function slp(ms){return new Promise(function(r){setTimeout(r,ms);});}
 async function pmb(add){while(true){var result=findMatches(b);var matches=result.matches;var groups=result.groups;var beff=new Set(),bc=new Set();for(var gi=0;gi<groups.length;gi++){var g=groups[gi];if(g.length>=4){var mid=Math.floor(g.cells.length/2);var coords=g.cells[mid].split(',');var mr=parseInt(coords[0]);var mc=parseInt(coords[1]);b[mr][mc]=B;bc.add(mr+','+mc);}}for(var r=0;r<R;r++){for(var c=0;c<C;c++){if(b[r][c]===B){var e=ab(r,c);e.forEach(function(k){beff.add(k);});}}}var all=new Set();matches.forEach(function(k){all.add(k);});beff.forEach(function(k){all.add(k);});if(all.size===0&&bc.size===0)break;var cnt=0;if(add&&matches.size>0){matches.forEach(function(key){var coords=key.split(',');var r=parseInt(coords[0]);var c=parseInt(coords[1]);var neighbors=[[r-1,c],[r+1,c],[r,c-1],[r,c+1]];for(var ni=0;ni<neighbors.length;ni++){var nr=neighbors[ni][0];var nc=neighbors[ni][1];if(nr>=0&&nr<R&&nc>=0&&nc<C){if(isFruitLevel&&b[nr][nc]!==null&&b[nr][nc]!==B&&b[nr][nc]!==V){cnt++;b[nr][nc]=null;}else if(!isFruitLevel&&b[nr][nc]===V){cnt++;b[nr][nc]=null;}}}});p+=cnt;}rb(false,matches,beff,bc);await slp(500);all.forEach(function(k){var coords=k.split(',');var r=parseInt(coords[0]);var c=parseInt(coords[1]);b[r][c]=null;});for(var c2=0;c2<C;c2++){var wr=R-1;for(var r2=R-1;r2>=0;r2--){if(b[r2][c2]!==null){b[wr][c2]=b[r2][c2];if(wr!==r2)b[r2][c2]=null;wr--;}}for(var r3=wr;r3>=0;r3--){if(!isFruitLevel&&Math.random()<0.15&&r3>0&&r3<R-1&&c2>0&&c2<C-1){b[r3][c2]=V;}else{b[r3][c2]=S[Math.floor(Math.random()*S.length)];}}}if(add)m--;u();rb(true);await slp(400);}if(p>=target){await lc();return;}if(m<=0){await go();return;}}
async function lc(){proc=true;gold+=GOLD_PER_LEVEL;cur+=Math.round(BOTTLES_PER_LEVEL*getBonusBottles());if(m>0){addEnergy(m*ENERGY_PER_MOVE);}u();var modal=document.createElement('div');modal.innerHTML='<div class="metro-content" style="text-align:center"><h2>🎉 Уровень пройден!</h2><p>🪙 +'+GOLD_PER_LEVEL+' | 🫙 +'+Math.round(BOTTLES_PER_LEVEL*getBonusBottles())+'</p><p>⚡ +'+(m*ENERGY_PER_MOVE)+' энергии</p><button id="nextLevelBtn" style="background:#f9ca24;color:#1a1a2e;border:none;padding:12px 30px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px">➡️ Следующий уровень</button></div>';modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;';document.body.appendChild(modal);await new Promise(function(resolve){var btn=document.getElementById('nextLevelBtn');if(btn){btn.addEventListener('click',function(){modal.remove();resolve();});}else{resolve();}});lv++;p=0;m=MAX_MOVES+getBonusMoves();b=createBoard();var mf=findMatches(b).matches;while(mf.size>0){mf.forEach(function(k){var coords=k.split(',');b[parseInt(coords[0])][parseInt(coords[1])]=S[Math.floor(Math.random()*S.length)];});mf=findMatches(b).matches;}if(!hvm())shuffle();sr=-1;sc=-1;rb(false);u();proc=false;}
async function go(){proc=true;var modal=document.createElement('div');modal.innerHTML='<div class="metro-content" style="text-align:center"><h2 style="color:#e74c3c;">💀 Ходы закончились!</h2><button id="retryBtn" style="background:#e74c3c;color:#fff;border:none;padding:12px 30px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px">🔄 Попробовать снова</button></div>';modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;';document.body.appendChild(modal);await new Promise(function(resolve){var btn=document.getElementById('retryBtn');if(btn){btn.addEventListener('click',function(){modal.remove();resolve();});}else{resolve();}});lv=Math.max(1,lv-1);p=0;m=MAX_MOVES+getBonusMoves();b=createBoard();var mf=findMatches(b).matches;while(mf.size>0){mf.forEach(function(k){var coords=k.split(',');b[parseInt(coords[0])][parseInt(coords[1])]=S[Math.floor(Math.random()*S.length)];});mf=findMatches(b).matches;}if(!hvm())shuffle();sr=-1;sc=-1;rb(false);u();proc=false;}
function hvm(){for(var r=0;r<R;r++){for(var c=0;c<C;c++){var v=b[r][c];if(v===null||v===B||v===V)continue;if(c<C-1&&b[r][c+1]!==B&&b[r][c+1]!==V){var tmp=b[r][c];b[r][c]=b[r][c+1];b[r][c+1]=tmp;if(findMatches(b).matches.size>0){tmp=b[r][c];b[r][c]=b[r][c+1];b[r][c+1]=tmp;return true;}tmp=b[r][c];b[r][c]=b[r][c+1];b[r][c+1]=tmp;}if(r<R-1&&b[r+1][c]!==B&&b[r+1][c]!==V){var tmp2=b[r][c];b[r][c]=b[r+1][c];b[r+1][c]=tmp2;if(findMatches(b).matches.size>0){tmp2=b[r][c];b[r][c]=b[r+1][c];b[r+1][c]=tmp2;return true;}tmp2=b[r][c];b[r][c]=b[r+1][c];b[r+1][c]=tmp2;}}}return false;}
